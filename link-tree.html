<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPI - Links</title>
    <link rel="icon" type="image/png" href="isolado-colorido.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }

        .link-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .cta-pulse {
            animation: pulse-shadow 2s infinite;
        }
        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 4px 15px rgba(127, 29, 29, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(127, 29, 29, 0.5); }
        }
    </style>
</head>
<body class="bg-[#FAFAFA] text-slate-600 selection:bg-[#7f1d1d] selection:text-white min-h-screen">

    <div class="max-w-md mx-auto pb-12">

        <!-- Banner -->
        <div class="relative h-48 bg-gradient-to-br from-[#7f1d1d] to-[#991b1b] overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-[#d97706]/20 via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-[#FAFAFA] to-transparent"></div>
        </div>

        <!-- Foto de Perfil -->
        <div class="relative -mt-16 flex flex-col items-center px-6">
            <div class="w-36 h-36 rounded-full border-4 border-white shadow-lg bg-white flex items-center justify-center overflow-hidden">
                <!-- Substitua pelo src da foto de perfil -->
                <img src="isolado-colorido.png" alt="CAPI Logo" class="w-[120%] h-[120%] object-contain scale-125">
            </div>

            <!-- Nome e Descrição -->
            <h1 class="mt-4 text-2xl font-serif font-semibold text-slate-900 text-center">Centro de Avaliação Psicológica Interlagos</h1>
            <p class="text-sm text-slate-500 text-center mt-1 max-w-xs leading-relaxed">
                Saúde mental integrada na zona sul de SP.
            </p>
        </div>

        <!-- CTA Principal -->
        <div class="px-6 mt-8">
            <a href="https://api.whatsapp.com/send/?phone=5511985593454&text=Ol%C3%A1%2C%20gostaria%20de%20agendar%20uma%20consulta.&type=phone_number&app_absent=0"
               class="cta-pulse link-card flex items-center justify-center gap-3 w-full py-4 px-6 bg-[#7f1d1d] text-white font-semibold text-base rounded-2xl hover:bg-[#991b1b] transition-colors">
                <iconify-icon icon="solar:calendar-bold" width="22"></iconify-icon>
                Agendar Consulta
            </a>
        </div>

        <!-- Links -->
        <div class="px-6 mt-4 flex flex-col gap-3">

            <!-- WhatsApp -->
            <a href="https://api.whatsapp.com/send/?phone=5511985593454&text&type=phone_number&app_absent=0"
               class="link-card flex items-center gap-4 w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-[#25D366]/10 flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="mdi:whatsapp" class="text-[#25D366]" width="24"></iconify-icon>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-slate-800">WhatsApp</p>
                    <p class="text-xs text-slate-400">Fale conosco diretamente</p>
                </div>
                <iconify-icon icon="solar:arrow-right-linear" class="text-slate-300" width="18"></iconify-icon>
            </a>

            <!-- Instagram
            <a href="#"
               class="link-card flex items-center gap-4 w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-[#E1306C]/10 flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="mdi:instagram" class="text-[#E1306C]" width="24"></iconify-icon>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-slate-800">Instagram</p>
                    <p class="text-xs text-slate-400">Acompanhe nosso conteúdo</p>
                </div>
                <iconify-icon icon="solar:arrow-right-linear" class="text-slate-300" width="18"></iconify-icon>
            </a> -->

            <!-- Site -->
            <a href="https://centro-avaliacao-lp.vercel.app/"
               class="link-card flex items-center gap-4 w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-[#7f1d1d]/10 flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="mdi:web" class="text-[#7f1d1d]" width="24"></iconify-icon>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-slate-800">Nosso Site</p>
                    <p class="text-xs text-slate-400">Conheça nossos serviços</p>
                </div>
                <iconify-icon icon="solar:arrow-right-linear" class="text-slate-300" width="18"></iconify-icon>
            </a>

            <!-- Localização -->
            <a href="https://www.google.com/maps/dir/?api=1&destination=Av.+Nossa+Senhora+do+Sabar%C3%A1,+2313,+S%C3%A3o+Paulo+-+SP"
               class="link-card flex items-center gap-4 w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-[#d97706]/10 flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="solar:map-point-linear" class="text-[#d97706]" width="24"></iconify-icon>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-slate-800">Localização</p>
                    <p class="text-xs text-slate-400">Zona Sul — São Paulo, SP</p>
                </div>
                <iconify-icon icon="solar:arrow-right-linear" class="text-slate-300" width="18"></iconify-icon>
            </a>

        </div>

        <!-- Footer -->
        <div class="mt-10 text-center">
            <p class="text-xs text-slate-400">&copy; 2026 CAPI — Centro de Avaliação Psicológica Interlagos</p>
        </div>

    </div>

</body>
</html>
